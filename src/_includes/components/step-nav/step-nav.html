<nav class="step-nav" aria-label="步驟導覽">
    <a href="{{ stepPrevHref }}" class="button button--primary">
        <img src="./images/icon_back.png" alt="" class="button__icon">上一步
    </a>

    <ol class="step-nav__nodes">
        {% for step in steps %}
        <li class="step-nav__node{% if step.done %} step-nav__node--done{% endif %}">{{ step.label }}</li>
        {% endfor %}
    </ol>

    <a href="{{ stepNextHref }}" class="button button--primary">
        下一步<img src="./images/icon_next.png" alt="" class="button__icon">
    </a>
</nav>
