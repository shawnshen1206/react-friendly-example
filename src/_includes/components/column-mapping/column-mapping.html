<div class="column-mapping">

    <section class="column-mapping__card block block--lg">
        <header class="column-mapping__header">
            <h2 class="column-mapping__title">欄位對應</h2>
            <p class="column-mapping__subtitle">請選擇欲對應的來源內容</p>
        </header>

        <div class="column-mapping__fields">
            {% for field in fields %}
            <div class="form-field">
                <label class="form-field__label">{{ field.label }}</label>
                <div class="form-field__control">
                    <div class="tag-select" title="{{ field.placeholder }}">
                        {% for tag in field.selected %}
                        <span class="tag-select__tag">{{ tag }}<span class="tag-select__remove"
                                aria-hidden="true">×</span></span>
                        {% endfor %}
                        {% if field.selected.length == 0 %}
                        <span class="tag-select__placeholder">{{ field.placeholder }}</span>
                        {% endif %}
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </section>

    <section class="column-mapping__card block block--lg">
        <header class="column-mapping__header">
            <h2 class="column-mapping__title">預覽</h2>
            <p class="column-mapping__subtitle">預覽已對應之結果</p>
        </header>

        <div class="column-mapping__fields">
            {% for field in fields %}
            <div class="form-field{% if field.error %} form-field--error{% endif %}">
                <label class="form-field__label">{{ field.label }}</label>
                <div class="form-field__control">
                    <input type="text" class="text-input{% if field.error %} text-input--error{% endif %}"
                        value="{{ field.preview }}" disabled>
                    {% if field.error %}
                    <span class="form-field__error">{{ field.error }}</span>
                    {% endif %}
                </div>
            </div>
            {% endfor %}
        </div>
    </section>

</div>
