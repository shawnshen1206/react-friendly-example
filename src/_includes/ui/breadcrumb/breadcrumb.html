<div class="breadcrumb">
    <div class="wrap">
        <ul>
            {% for item in breadcrumbItems %}
            <li>
                {% if item.href %}
                <a href="{{ item.href }}" title="{{ item.label }}">{{ item.label }}</a>
                {% else %}
                {{ item.label }}
                {% endif %}
            </li>
            {% endfor %}
        </ul>
    </div>
</div>
